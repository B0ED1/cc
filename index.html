<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For The Prettiest 🌸</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f1a8c0;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .heart {
            position: fixed;
            top: -10px;
            color: #ff6b81;
            font-size: 20px;
            user-select: none;
            z-index: -1;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(100vh); }
        }

        .card {
            background: rgba(255, 255, 255, 0.9);
            max-width: 400px;
            padding: 40px 30px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(255, 182, 193, 0.4);
            border: 2px solid #ffcad4;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        h1 {
            color: #ff6b81;
            font-size: 26px;
            margin-bottom: 20px;
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.05);
        }

        .pesan {
            color: #666;
            line-height: 1.8;
            font-size: 15px;
            margin-bottom: 25px;
            text-align: center;
            font-style: italic;
        }

        .foto-utama {
            width: 100%;
            max-width: 280px;
            height: auto;
            border: 8px solid white;
            outline: 2px solid #ffb6c1;
            border-radius: 20px;
            margin-bottom: 20px;
            transition: transform 0.3s ease;
        }

        .foto-utama:hover {
            transform: scale(1.05) rotate(2deg);
        }

        .gif-pemanis {
            width: 100px;
            margin: 10px 0;
        }

        /* Musik Section */
        .music-box {
            background: #fff5f7;
            padding: 10px;
            border-radius: 50px;
            margin-top: 20px;
            border: 1px dashed #ff6b81;
        }

        .footer {
            font-size: 13px;
            color: #ff8fa3;
            margin-top: 20px;
            font-weight: bold;
        }

        /* Tombol Play Custom */
        .play-btn {
            background: #ff6b81;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.3s;
        }

        .play-btn:hover {
            background: #ff4757;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>To The Prettiest Girl I Know 🩷</h1>

        <img src="Lovelle.jpeg" alt="Sunshine" class="foto-utama">

        <div class="pesan">
            "Heyhoo, kamu itu sempurna, cantik, dan lucu banget! <br>
            Jangan pernah ngerasa kurang ya sayang, karena di mata aku dan orang-orang yang sayang kamu, kamu itu paket lengkap. <br>
            Stay happy, I always supporting you! ✨"
        </div>

        <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExYTAzejBsa2RraW1nYm1wanJ5ZDZkanBvNzRoYjRmbzRvODhic3NmdCZlcD12MV9naWZzX3NlYXJjaCZjdD1n/26FLdmIp6wJr91JAI/200.webp" alt="Tunggu" class="gif-pemanis" width="300">
        
        <div class="music-box">
            <div id="player" style="display:none;"></div>
            <p style="font-size: 0.7rem; color: #ff8fa3; margin-bottom: 5px;">Listen to this for you ✨</p>
            <button class="play-btn" onclick="playMusic()">Klik untuk Musik 🎵</button>
        </div>

        <p class="footer">Made with love by Arif</p>
    </div>

    <script>
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        var player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '0',
                width: '0',
                videoId: 'gVuOUSKe-A4',                  playerVars: {
                    'autoplay': 0,
                    'loop': 1,
                    'playlist': 'gVuOUSKe-A4'
                }
            });
        }

        function playMusic() {
            player.playVideo();
            document.querySelector('.play-btn').innerText = "Playing... 🥰";
        }

        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '🩷';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 3 + 2 + 's';
            heart.style.opacity = Math.random();
            document.body.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 5000);
        }

        setInterval(createHeart, 300);
    </script>

</body>
</html>
